<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session History &mdash; EMG Biofeedback Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div>
      <a class="back-link" href="index.html">&larr; Home</a>
      <h1>Session History</h1>
      <div class="subtitle">Saved calibration + monitoring session summaries</div>
    </div>
  </header>

  <div class="panel">
    <h2>Saved Sessions</h2>
    <div id="sessions-table-wrap">
      <p class="field-note">Loading...</p>
    </div>
  </div>

  <div class="panel" id="detail-panel" style="display:none;">
    <h2 id="detail-title">Session Detail</h2>
    <div id="detail-summary"></div>
    <div id="detail-chart-container" style="height:260px; margin-top:14px;">
      <canvas id="detail-chart"></canvas>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  const tableWrap = document.getElementById('sessions-table-wrap');
  const detailPanel = document.getElementById('detail-panel');
  const detailTitle = document.getElementById('detail-title');
  const detailSummary = document.getElementById('detail-summary');
  let detailChart = null;

  function fmtPct(v) { return v === null || v === undefined ? '\u2014' : `${(v).toFixed(1)}%`; }
  function fmtFrac(v) { return v === null || v === undefined ? '\u2014' : `${(v * 100).toFixed(0)}%`; }
  function fmtNum(v, digits = 0) { return v === null || v === undefined ? '\u2014' : Number(v).toFixed(digits); }

  async function loadSessions() {
    try {
      const res = await fetch('/api/sessions');
      const sessions = await res.json();
      renderTable(sessions);
    } catch (err) {
      tableWrap.innerHTML = `<p class="field-note">Could not load sessions: ${err.message}</p>`;
    }
  }

  function renderTable(sessions) {
    if (sessions.length === 0) {
      tableWrap.innerHTML = '<p class="field-note">No sessions saved yet. Calibrate and click "Save Session Summary" on the Live or Test page.</p>';
      return;
    }

    const rows = sessions.map((s) => `
      <tr data-id="${s.id}" class="session-row">
        <td>${s.id}</td>
        <td>${new Date(s.created_at).toLocaleString()}</td>
        <td>${s.mode}</td>
        <td>${s.patient_label || '\u2014'}</td>
        <td>${fmtNum(s.baseline)}</td>
        <td>${fmtNum(s.mvc)}</td>
        <td>${fmtNum(s.low_zone_pct)}% / ${fmtNum(s.high_zone_pct)}%</td>
        <td>${fmtNum(s.duration_sec)}s</td>
        <td>${fmtPct(s.pct_mean)}</td>
        <td>${fmtPct(s.pct_max)}</td>
        <td><button class="danger" data-delete-id="${s.id}" style="padding:4px 10px; font-size:12px;">Delete</button></td>
      </tr>
    `).join('');

    tableWrap.innerHTML = `
      <table class="sessions-table">
        <thead>
          <tr>
            <th>ID</th><th>Saved</th><th>Mode</th><th>Label</th>
            <th>Baseline</th><th>MVC</th><th>Zones (low/high)</th>
            <th>Duration</th><th>Mean %MVC</th><th>Peak %MVC</th><th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    tableWrap.querySelectorAll('.session-row').forEach((row) => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('button')) return; // don't open detail when clicking Delete
        showDetail(row.dataset.id);
      });
    });

    tableWrap.querySelectorAll('[data-delete-id]').forEach((btn) => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.deleteId;
        if (!confirm(`Delete session #${id}? This can't be undone.`)) return;
        await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
        loadSessions();
        detailPanel.style.display = 'none';
      });
    });
  }

  async function showDetail(id) {
    const res = await fetch(`/api/sessions/${id}`);
    const s = await res.json();
    if (!res.ok) {
      alert(s.error || 'Could not load session.');
      return;
    }

    detailPanel.style.display = 'block';
    detailTitle.textContent = `Session #${s.id}${s.patient_label ? ' \u2014 ' + s.patient_label : ''}`;
    detailSummary.innerHTML = `
      <p class="field-note" style="font-size:13px;">
        Saved ${new Date(s.created_at).toLocaleString()} &middot; mode: ${s.mode} &middot;
        baseline: ${fmtNum(s.baseline)} &middot; MVC: ${fmtNum(s.mvc)} &middot;
        zone thresholds: ${fmtNum(s.low_zone_pct)}% / ${fmtNum(s.high_zone_pct)}% &middot;
        duration: ${fmtNum(s.duration_sec)}s &middot; samples: ${s.sample_count}<br>
        %MVC \u2014 min: ${fmtPct(s.pct_min)}, mean: ${fmtPct(s.pct_mean)}, max: ${fmtPct(s.pct_max)} &middot;
        time in zone \u2014 green: ${fmtFrac(s.pct_in_green_frac)}, yellow: ${fmtFrac(s.pct_in_yellow_frac)}, red: ${fmtFrac(s.pct_in_red_frac)}
      </p>
    `;

    const labels = s.waveform_summary.map((p) => p.t);
    const values = s.waveform_summary.map((p) => p.pct);

    if (detailChart) detailChart.destroy();
    detailChart = new Chart(document.getElementById('detail-chart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: '%MVC over time', data: values, borderColor: '#1b6e63', borderWidth: 1.5, pointRadius: 0, tension: 0.15 },
          { label: 'low zone', data: labels.map(() => s.low_zone_pct), borderColor: '#c98a12', borderDash: [4, 4], borderWidth: 1, pointRadius: 0 },
          { label: 'high zone', data: labels.map(() => s.high_zone_pct), borderColor: '#c2453c', borderDash: [4, 4], borderWidth: 1, pointRadius: 0 },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { title: { display: true, text: 'seconds into session' } },
          y: { min: 0, suggestedMax: 100 },
        },
      },
    });
  }

  loadSessions();
</script>
</body>
</html>
